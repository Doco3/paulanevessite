<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paula Neves Estética</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .reveal { opacity: 0; transition: all 1.2s cubic-bezier(0.2, 0, 0.2, 1); }
        .reveal.fade-up { transform: translateY(30px); }
        .reveal.fade-left { transform: translateX(-30px); }
        .reveal.fade-right { transform: translateX(30px); }
        .reveal.is-visible { opacity: 1; transform: translate(0, 0); }
        
        /* Loading fallback */
        #root:empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fdfaf8;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #fdfaf8; }
        ::-webkit-scrollbar-thumb { background: #bc8a5f; }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow { animation: bounce-slow 4s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#fdfaf8]">
    <div id="root">
        <!-- Loader inicial enquanto o React não monta -->
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-[#bc8a5f]/20 border-t-[#bc8a5f] rounded-full animate-spin"></div>
            <p class="text-[#bc8a5f] font-serif italic text-xl animate-pulse">Paula Neves</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente de Ícone mais seguro para ambiente CDN
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': 2
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        const BeforeAfter = () => {
            const [sliderPos, setSliderPos] = useState(50);
            const containerRef = useRef(null);

            const handleMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const xPos = e.touches ? e.touches[0].clientX : e.clientX;
                const x = xPos - rect.left;
                const pos = Math.max(0, Math.min(100, (x / rect.width) * 100));
                setSliderPos(pos);
            };

            return (
                <div className="max-w-2xl mx-auto px-4 reveal fade-up">
                    <div 
                        ref={containerRef}
                        className="relative w-full aspect-[16/10] md:aspect-[16/9] rounded-[2rem] overflow-hidden shadow-xl cursor-ew-resize group select-none border-4 border-white bg-gray-100"
                        onMouseMove={handleMove}
                        onTouchMove={handleMove}
                    >
                        <img 
                            src="https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?q=80&w=1200&auto=format&fit=crop" 
                            alt="Depois" 
                            className="absolute inset-0 w-full h-full object-cover"
                        />
                        <div 
                            className="absolute inset-0 w-full h-full z-10"
                            style={{ clipPath: `inset(0 ${100 - sliderPos}% 0 0)` }}
                        >
                            <img 
                                src="https://images.unsplash.com/photo-1515377678503-621027d82253?q=80&w=1200&auto=format&fit=crop" 
                                alt="Antes" 
                                className="absolute inset-0 w-full h-full object-cover grayscale-[0.2]"
                            />
                        </div>
                        <div className="absolute top-0 bottom-0 z-20 w-1 bg-white shadow-lg pointer-events-none" style={{ left: `${sliderPos}%` }}>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-full shadow-2xl flex items-center justify-center text-[#bc8a5f]">
                                <Icon name="waves" size={20} className="animate-pulse" />
                            </div>
                        </div>
                        <div className="absolute bottom-4 left-4 z-30 bg-black/30 backdrop-blur-md text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Antes</div>
                        <div className="absolute bottom-4 right-4 z-30 bg-[#bc8a5f]/80 backdrop-blur-md text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Depois</div>
                    </div>
                </div>
            );
        };

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [activeTab, setActiveTab] = useState('corpo');
            const WHATSAPP_LINK = "https://wa.me/5524992940693";

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('is-visible');
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const tabContent = {
                corpo: { title: "Escultura Corporal", desc: "Protocolos que respeitam sua fisiologia para reduzir medidas.", image: "https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=1000&auto=format&fit=crop" },
                rosto: { title: "Lifting Natural", desc: "Rejuvenescimento sem agulhas.", image: "https://images.unsplash.com/photo-1512290901235-07c08230bd73?q=80&w=1000&auto=format&fit=crop" },
                saude: { title: "Bem-estar & Mente", desc: "O autocuidado começa por dentro.", image: "https://images.unsplash.com/photo-1519823551278-64ac92734fb1?q=80&w=1000&auto=format&fit=crop" }
            };

            return (
                <div className="min-h-screen text-[#4a413d] overflow-x-hidden">
                    {/* Navegação */}
                    <nav className={`fixed w-full z-[100] transition-all duration-700 ${scrolled ? 'bg-white/70 backdrop-blur-xl shadow-lg py-3' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-[#4a413d] flex items-center justify-center text-white font-serif text-xl italic font-bold">PN</div>
                                <span className="font-serif text-lg tracking-[0.2em] font-bold">PAULA NEVES</span>
                            </div>
                            <div className="hidden md:flex items-center gap-10 text-[10px] font-bold tracking-[0.2em] uppercase">
                                <a href="#home" className="hover:text-[#bc8a5f] transition-colors">Início</a>
                                <a href="#metodo" className="hover:text-[#bc8a5f] transition-colors">O Método</a>
                                <a href="#resultados" className="hover:text-[#bc8a5f] transition-colors">Resultados</a>
                                <a href={WHATSAPP_LINK} className="bg-[#bc8a5f] text-white px-8 py-3 rounded-full shadow-xl shadow-[#bc8a5f]/20 hover:scale-105 transition-transform">Agendar</a>
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} size={24} />
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section id="home" className="relative h-screen flex items-center pt-20">
                        <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center relative z-10">
                            <div className="space-y-10 reveal fade-left">
                                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/50 border border-[#bc8a5f]/20 backdrop-blur-md text-[#bc8a5f] text-[10px] font-bold uppercase tracking-[0.2em]">
                                    <Icon name="sparkles" size={14} /> Atendimento Exclusivo VR & SP
                                </div>
                                <h1 className="text-7xl md:text-8xl font-serif leading-[0.9] tracking-tighter">
                                    A estética que <br /> <span className="italic text-[#bc8a5f]">você sente.</span>
                                </h1>
                                <p className="text-xl text-gray-500 max-w-lg font-light leading-relaxed">
                                    Protocolos personalizados que unem alta tecnologia ao toque humano para resultados que transbordam confiança.
                                </p>
                                <a href={WHATSAPP_LINK} className="inline-flex items-center gap-4 bg-[#4a413d] text-white px-12 py-6 rounded-full font-bold hover:bg-[#bc8a5f] transition-all shadow-2xl">
                                    QUERO UM DIAGNÓSTICO <Icon name="arrow-right" size={20} />
                                </a>
                            </div>
                            <div className="hidden lg:block relative reveal fade-right">
                                <div className="rounded-[3rem] overflow-hidden shadow-2xl">
                                    <img src="https://images.unsplash.com/photo-1560750588-73207b1ef5b8?q=80&w=1000&auto=format&fit=crop" className="w-full h-[600px] object-cover" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Criolipólise */}
                    <section className="py-32 bg-[#4a413d] text-white overflow-hidden relative">
                        <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-12 gap-16 items-center">
                            <div className="lg:col-span-5 reveal fade-left">
                                <div className="relative rounded-[3rem] overflow-hidden border-2 border-white/10 shadow-2xl">
                                    <img src="https://images.unsplash.com/photo-1512290901235-07c08230bd73?q=80&w=1000&auto=format&fit=crop" className="w-full h-[500px] object-cover grayscale opacity-60" />
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-white/10 backdrop-blur-xl flex items-center justify-center text-[#bc8a5f] animate-pulse">
                                        <Icon name="snowflake" size={40} />
                                    </div>
                                </div>
                            </div>
                            <div className="lg:col-span-7 space-y-8 reveal fade-right">
                                <h3 className="text-5xl font-serif italic text-[#bc8a5f]">Criolipólise: O gelo que esculpe.</h3>
                                <p className="text-white/60 text-lg font-light leading-relaxed">Elimine gordura de forma definitiva através do resfriamento controlado. Tecnologia indolor e resultados surpreendentes.</p>
                                <a href={WHATSAPP_LINK} className="inline-block bg-white text-[#4a413d] px-10 py-5 rounded-full font-bold hover:bg-[#bc8a5f] hover:text-white transition-all">AGENDAR AGORA</a>
                            </div>
                        </div>
                    </section>

                    {/* Resultados */}
                    <section id="resultados" className="py-32 bg-[#fdfaf8]">
                        <div className="text-center mb-20 reveal fade-up">
                            <h3 className="text-4xl font-serif italic">Transformações Reais</h3>
                            <p className="text-gray-400 text-sm mt-4 uppercase tracking-[0.3em]">Arraste para comparar</p>
                        </div>
                        <BeforeAfter />
                    </section>

                    {/* Footer */}
                    <footer className="py-12 bg-white text-center border-t border-gray-100">
                        <div className="flex justify-center gap-6 mb-6">
                            <a href="#" className="text-gray-300 hover:text-[#bc8a5f] transition-colors"><Icon name="instagram" size={24} /></a>
                            <a href={WHATSAPP_LINK} className="text-gray-300 hover:text-[#25D366] transition-colors"><Icon name="message-circle" size={24} /></a>
                        </div>
                        <p className="text-[10px] tracking-widest uppercase text-gray-300 font-bold">© 2024 Paula Neves Estética Avançada.</p>
                    </footer>

                    {/* WhatsApp */}
                    <a href={WHATSAPP_LINK} className="fixed bottom-8 right-8 z-[200] bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
                        <Icon name="message-circle" size={32} />
                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
